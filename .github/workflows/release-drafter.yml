name: Release Drafter

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions: {}

jobs:
  # Draft your next Release notes as Pull Requests are merged into the default branch
  draft-release:
    permissions:
      contents: write
      pull-requests: read
    uses: cpp-linter/.github/.github/workflows/release-drafter.yml@main
